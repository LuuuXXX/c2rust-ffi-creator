name: Build & Verify (C + Rust FFI)

on:
  push:
    branches: [ main, "copilot/**" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-verify:
    name: Build C + Rust, verify examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install C build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc g++ binutils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            examples/simple-calc/target
            examples/complex-kv-store/target
            examples/cpp-string-utils/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('examples/*/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ════════════════════════════════════════════════════════════════════
      # Example 1: simple-calc
      #   Pattern — C library compiled in via cc, wrapped by hicc C++ adapter.
      # ════════════════════════════════════════════════════════════════════

      - name: "[simple-calc] Build C library and test binary"
        working-directory: examples/simple-calc
        run: |
          cmake -B .c2rust/c/_build -S .c2rust/c \
            -DCMAKE_BUILD_TYPE=Release \
            -Wno-dev
          cmake --build .c2rust/c/_build

      - name: "[simple-calc] Run C tests"
        working-directory: examples/simple-calc
        run: .c2rust/c/_build/test_calc

      - name: "[simple-calc] Build Rust (using hicc)"
        working-directory: examples/simple-calc
        run: cargo build --release

      - name: "[simple-calc] Test Rust (mirrors C test suite, via hicc)"
        working-directory: examples/simple-calc
        run: cargo test

      # ════════════════════════════════════════════════════════════════════
      # Example 2: complex-kv-store
      #   Pattern — C library compiled in via cc, wrapped by hicc C++ adapter.
      # ════════════════════════════════════════════════════════════════════

      - name: "[complex-kv-store] Build C library and test binary"
        working-directory: examples/complex-kv-store
        run: |
          cmake -B .c2rust/c/_build -S .c2rust/c \
            -DCMAKE_BUILD_TYPE=Release \
            -Wno-dev
          cmake --build .c2rust/c/_build

      - name: "[complex-kv-store] Run C tests"
        working-directory: examples/complex-kv-store
        run: .c2rust/c/_build/test_kv

      - name: "[complex-kv-store] Build Rust (using hicc)"
        working-directory: examples/complex-kv-store
        run: cargo build --release

      - name: "[complex-kv-store] Test Rust (mirrors C test suite, via hicc)"
        working-directory: examples/complex-kv-store
        run: cargo test

      # ════════════════════════════════════════════════════════════════════
      # Example 3: cpp-string-utils
      #   Pattern — C library wrapped via hicc (C++ adapter layer).
      # ════════════════════════════════════════════════════════════════════

      - name: "[cpp-string-utils] Build C library and test binary"
        working-directory: examples/cpp-string-utils
        run: |
          cmake -B .c2rust/c/_build -S .c2rust/c \
            -DCMAKE_BUILD_TYPE=Release \
            -Wno-dev
          cmake --build .c2rust/c/_build

      - name: "[cpp-string-utils] Run C tests"
        working-directory: examples/cpp-string-utils
        run: .c2rust/c/_build/test_str_counter

      - name: "[cpp-string-utils] Build Rust (using hicc)"
        working-directory: examples/cpp-string-utils
        run: cargo build --release

      - name: "[cpp-string-utils] Test Rust (mirrors C test suite, via hicc)"
        working-directory: examples/cpp-string-utils
        run: cargo test

      # ════════════════════════════════════════════════════════════════════
      # Validate SKILL structure
      # ════════════════════════════════════════════════════════════════════

      - name: Validate c2rust-ffi-creator skill
        run: |
          python3 - c2rust-ffi-creator << 'EOF'
          import sys, re
          from pathlib import Path

          skill_path = Path(sys.argv[1])
          skill_md = skill_path / 'SKILL.md'
          if not skill_md.exists():
              print("FAIL: SKILL.md not found"); sys.exit(1)
          content = skill_md.read_text()
          if not content.startswith('---'):
              print("FAIL: Missing YAML frontmatter"); sys.exit(1)
          match = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
          if not match:
              print("FAIL: Invalid frontmatter format"); sys.exit(1)
          fm = match.group(1)
          if 'name:' not in fm:
              print("FAIL: Missing 'name' in frontmatter"); sys.exit(1)
          if 'description:' not in fm:
              print("FAIL: Missing 'description' in frontmatter"); sys.exit(1)
          name_match = re.search(r'name:\s*(.+)', fm)
          if name_match:
              name = name_match.group(1).strip()
              if not re.match(r'^[a-z0-9-]+$', name):
                  print(f"FAIL: Invalid name '{name}'"); sys.exit(1)
          print(f"PASS: Skill '{skill_path.name}' validation passed")
          EOF
